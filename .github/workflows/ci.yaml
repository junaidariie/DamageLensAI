name: DamageLens CI Pipeline

on:
  push:
    branches:
      - main
      - master
      - dev

  pull_request:
    branches:
      - main
      - master
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify Project Structure
        run: |
          ls
          ls src
          ls test

      - name: Run Config Test
        run: python test/test_config.py

      - name: Run Ingestion Test
        run: python test/test_ingestion.py

      - name: Run Preprocessing Test
        run: python test/test_preprocessing.py

      - name: Run Augmentation Test
        run: python test/test_augmentation.py

      - name: Run Dataset Test
        run: python test/test_dataset.py

      - name: Run ResNet Architecture Test
        run: python test/test_resnet_model.py

      - name: Run ResNet Training Smoke Test
        run: python test/test_train_resnet.py